name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Verify CLI
        run: |
          .build/Herald.app/Contents/MacOS/herald --version
          ARCH=$(uname -m)
          echo "arch=${ARCH}" >> "$GITHUB_ENV"

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${arch}"
          ARTIFACT="herald-${VERSION}-macos-${ARCH}.tar.gz"
          tar -czvf "$ARTIFACT" -C .build Herald.app -C ${{ github.workspace }} README.md LICENSE
          shasum -a 256 "$ARTIFACT" > "$ARTIFACT.sha256"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            herald-*.tar.gz
            herald-*.sha256
